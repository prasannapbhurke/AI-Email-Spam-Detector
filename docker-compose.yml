version: '3.8'

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://admin:secret@mongodb:27017/spam_detector
      ENABLE_DB_WRITES: "true"
    depends_on:
      - mongodb
    volumes:
      - ./models:/app/models

volumes:
  mongodb_data:
