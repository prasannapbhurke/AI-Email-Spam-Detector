<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Spam Detector - Test Frontend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .loader.active {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .result {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result.spam {
            background: #fee2e2;
            border: 2px solid #ef4444;
        }
        .result.ham {
            background: #d1fae5;
            border: 2px solid #10b981;
        }
        .result-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .result-details {
            font-size: 14px;
            color: #555;
        }
        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            transition: width 0.5s ease-out;
        }
        .error {
            display: none;
            background: #fee2e2;
            color: #dc2626;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #fecaca;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            font-size: 13px;
        }
        .stat-box {
            background: #f8fafc;
            padding: 10px;
            border-radius: 6px;
        }
        .stat-label {
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Email Spam Detector</h1>
        <p class="subtitle">AI-powered spam classification using NLP & Machine Learning</p>

        <form id="spamForm">
            <div class="form-group">
                <label for="emailText">Email Content</label>
                <textarea
                    id="emailText"
                    name="email_text"
                    placeholder="Paste the email content here to classify as spam or legitimate..."
                    required
                ></textarea>
            </div>
            <button type="submit" id="submitBtn">Analyze Email</button>
        </form>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Analyzing...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-details">
                <p>The email has been analyzed by the AI model.</p>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-label">Prediction</div>
                        <div class="stat-value" id="predictionLabel">-</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Confidence</div>
                        <div class="stat-value" id="confidenceValue">-</div>
                    </div>
                </div>
                <p style="margin-top: 10px;">
                    Spam Probability: <strong id="spamProb">-</strong>
                </p>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin; // Same origin, port 8000

        document.getElementById('spamForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const emailText = document.getElementById('emailText').value;
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');

            // Reset UI
            errorDiv.style.display = 'none';
            resultDiv.style.display = 'none';
            submitBtn.disabled = true;
            loader.classList.add('active');

            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email_text: emailText })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Prediction failed');
                }

                // Display result
                const isSpam = data.prediction === 'spam';
                resultDiv.className = `result ${isSpam ? 'spam' : 'ham'}`;
                document.getElementById('resultTitle').textContent =
                    isSpam ? '🚨 Spam Detected' : '✓ Legitimate Email';
                document.getElementById('predictionLabel').textContent =
                    isSpam ? 'SPAM' : 'HAM';
                document.getElementById('confidenceValue').textContent =
                    `${(data.confidence * 100).toFixed(1)}%`;
                document.getElementById('spamProb').textContent =
                    `${(data.spam_probability * 100).toFixed(2)}%`;

                const fill = document.getElementById('confidenceFill');
                fill.style.width = `${data.confidence * 100}%`;
                fill.style.background = isSpam ? '#ef4444' : '#10b981';

                resultDiv.style.display = 'block';

            } catch (error) {
                errorDiv.textContent = `Error: ${error.message}`;
                errorDiv.style.display = 'block';
            } finally {
                loader.classList.remove('active');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
